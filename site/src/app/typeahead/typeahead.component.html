<input #inputElement type="text" class="form-control {{inputClass}}" 
    (selectItem)="onSelectItemMine($event)" 
    [ngbTypeahead]="search" 
    [inputFormatter]="formatter" 
    [resultFormatter]="resultFormatter || formatter"
    [editable]='false'
    [value]="itemName ? itemName : ''"
    placement='auto'
    placeholder="{{placeholder}}"
    />
